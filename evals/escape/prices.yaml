# Per-million-token prices in USD, sourced from OpenRouter's public
# pricing pages (https://openrouter.ai/<model>) at sweep time. These
# are estimates — for ground-truth spend the sweep snapshots the
# /credits balance before and after the run (see sweep.py).
#
# Keys match the model id used in chat completions (i.e. the value
# of the trial record's `model` field, not `served_by_model`).

models:
  deepseek/deepseek-v4-pro:
    input_per_M: 0.435
    output_per_M: 0.87
  deepseek/deepseek-v4-flash:
    input_per_M: 0.14
    output_per_M: 0.28
  qwen/qwen3.6-max-preview:
    input_per_M: 1.04
    output_per_M: 6.24
  qwen/qwen3.6-35b-a3b:
    input_per_M: 0.16
    output_per_M: 0.32
  qwen/qwen3.6-27b:
    input_per_M: 0.10
    output_per_M: 0.20
  nvidia/nemotron-3-super-120b-a12b:
    input_per_M: 0.20
    output_per_M: 0.40

# When a model is missing from this table, the aggregator reports cost
# as null (None) rather than guessing. Update on each tier rerun.
