# ToolClad manifest: store_knowledge (v11)
#
# Re-backs the reflector's existing `store_knowledge` tool surface
# (crates/symbi-kloop-bench/src/reflector.rs) with a typed-argument fence.
# Both fields are plain `string` — ToolClad's default string validator
# rejects shell metacharacters and newlines, which is the relevant fence
# signal for this surface. The body is otherwise allowed to be free-form
# prose; payload neutralisation is a separate fence (symbi-invis-strip).
#
# This manifest does NOT carry [command] / [http] / [mcp] sections — the
# reflector dispatches via a Rust callback after the bridge accepts the
# args. The bridge's validate_args path is sufficient; ToolClad's
# executor::execute is not invoked.

[tool]
name = "store_knowledge"
version = "1.0.0"
binary = "<rust-callback>"
description = "Persist a key/body pair into the reflector's knowledge store"
timeout_seconds = 5
risk_tier = "low"

[args.key]
position = 1
required = true
type = "string"
description = "Short identifier for this knowledge entry"

[args.body]
position = 2
required = true
type = "string"
description = "Free-form lessons-learned body (sanitiser runs after acceptance)"

# ToolClad's manifest schema requires at least one execution backend.
# `store_knowledge` is dispatched in-process by a Rust callback, not by
# the toolclad executor — the bridge calls only `validate_args`, never
# `execute()`. The placeholder `true` binary is a no-op that satisfies
# the schema; if ever invoked accidentally it returns 0 with empty
# output, which would surface as a missing-knowledge-entry test failure
# rather than a security hole.
[command]
exec = ["true"]

# Required by ToolClad's manifest schema. The reflector's ack envelope
# is constant-shaped.
[output]
format = "json"
envelope = true

[output.schema]
type = "object"

[output.schema.properties.stored]
type = "boolean"
description = "True when the entry was accepted into the knowledge store"
