# ToolClad manifest: store_knowledge (v11, updated for ToolClad v0.6.0)
#
# Re-backs the reflector's existing `store_knowledge` tool surface
# (crates/symbi-kloop-bench/src/reflector.rs, ReflectorActionExecutor in
# crates/demo-karpathy-loop/src/reflector_executor.rs) with a
# typed-argument fence. The three string fields are plain `string` —
# ToolClad's default string validator rejects shell metacharacters and
# newlines, which is the relevant fence signal for this surface. The
# values are otherwise allowed to be free-form prose; payload
# neutralisation is a separate fence (symbi-invis-strip).
#
# Uses `dispatch = "callback"` (added in ToolClad v0.6.0) so the
# manifest can declare a validator-only contract without a placeholder
# [command] backend. The reflector dispatches via Rust callback after
# the bridge accepts the args; the bridge calls only `validate_args`,
# never `execute()`.

[tool]
name = "store_knowledge"
version = "1.0.0"
binary = "callback"
description = "Persist a single subject-predicate-object procedure into the reflector's knowledge store"
timeout_seconds = 5
risk_tier = "low"
dispatch = "callback"

[args.subject]
position = 1
required = true
type = "string"
description = "Subject of the procedure (under 60 characters)"

[args.predicate]
position = 2
required = true
type = "string"
description = "Predicate of the procedure"

[args.object]
position = 3
required = true
type = "string"
description = "Object of the procedure"

# v0.6.0 added the `number` type, so confidence can now be properly
# range-validated rather than left out of the typed-argument fence.
[args.confidence]
position = 4
required = false
type = "number"
min_float = 0.0
max_float = 1.0
description = "Self-reported confidence in [0.0, 1.0]"
