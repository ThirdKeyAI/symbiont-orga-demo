# ToolClad manifest: store_knowledge (v11)
#
# Re-backs the reflector's existing `store_knowledge` tool surface
# (crates/symbi-kloop-bench/src/reflector.rs, ReflectorActionExecutor in
# crates/demo-karpathy-loop/src/reflector_executor.rs) with a
# typed-argument fence. The three string fields are plain `string` —
# ToolClad's default string validator rejects shell metacharacters and
# newlines, which is the relevant fence signal for this surface. The
# values are otherwise allowed to be free-form prose; payload
# neutralisation is a separate fence (symbi-invis-strip).
#
# `confidence` is a numeric in [0, 1] — ToolClad has no float type, so
# this field is intentionally NOT declared in [args]. The reflector's
# Rust path clamps it independently. Argument-fence focus is the three
# string fields.
#
# This manifest does NOT carry a real [command] backend — the reflector
# dispatches via Rust callback after the bridge accepts the args. The
# placeholder `exec = ["true"]` satisfies ToolClad's schema; the bridge
# calls only `validate_args`, never `execute()`.

[tool]
name = "store_knowledge"
version = "1.0.0"
binary = "<rust-callback>"
description = "Persist a single subject-predicate-object procedure into the reflector's knowledge store"
timeout_seconds = 5
risk_tier = "low"

[args.subject]
position = 1
required = true
type = "string"
description = "Subject of the procedure (under 60 characters)"

[args.predicate]
position = 2
required = true
type = "string"
description = "Predicate of the procedure"

[args.object]
position = 3
required = true
type = "string"
description = "Object of the procedure"

[command]
exec = ["true"]

[output]
format = "json"
envelope = true

[output.schema]
type = "object"

[output.schema.properties.stored]
type = "boolean"
description = "True when the entry was accepted into the knowledge store"
